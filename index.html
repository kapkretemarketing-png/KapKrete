<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KapKrete Surface Solutions</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,300;0,400;0,600;0,700;0,800;1,700&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: #141414; font-family: 'Barlow', sans-serif; color: #141414; }
    button, a { font-family: inherit; }
    ::selection { background: #C41230; color: #fff; }

    /* Scroll fade-in */
    .fade-in { opacity: 0; transform: translateY(20px); transition: opacity 0.5s ease, transform 0.5s ease; }
    .fade-in.visible { opacity: 1; transform: translateY(0); }

    /* Red rule line utility */
    .red-rule { display: flex; align-items: center; gap: 12px; }
    .red-rule::before { content: ''; display: block; width: 32px; height: 1px; background: #C41230; flex-shrink: 0; }

    /* Image parallax container */
    .img-fill { position: absolute; inset: 0; background-size: cover; background-position: center; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #141414; }
    ::-webkit-scrollbar-thumb { background: #C41230; }

    /* ── Responsive grid helpers ── */
    .r-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; }
    .r-grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
    .r-grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px; }
    .r-grid-service { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; }
    .r-two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: start; }
    .r-two-col-center { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center; }
    .r-hero-stats { display: flex; }
    .r-stat-item { flex: 1; padding: 28px 0; padding-right: 36px; display: flex; align-items: center; gap: 14px; }
    .r-stat-item:not(:last-child) { border-right: 1px solid rgba(255,255,255,0.08); }
    .r-stat-item:not(:first-child) { padding-left: 36px; }
    .r-nav-links { display: flex; align-items: center; gap: 36px; }
    .r-hamburger { display: none; background: none; border: none; cursor: pointer; padding: 4px; }
    .r-mobile-menu { display: none; }
    .r-utility-bar { display: flex; }
    .r-hide-mobile { display: block; }
    .r-pad { padding: 0 48px; }
    .r-section-pad { padding: 96px 0; }
    .r-swatch-grid-flex { display: grid; grid-template-columns: repeat(9, 1fr); gap: 3px; }
    .r-swatch-grid-stone { display: grid; grid-template-columns: repeat(5, 1fr); gap: 3px; }
    .r-swatch-grid-poly { display: grid; grid-template-columns: repeat(4, 1fr); gap: 3px; }
    .r-process-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px; }
    .r-gallery-grid { display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(2, 240px); gap: 4px; }
    .r-color-picker-grid { display: grid; grid-template-columns: 1fr 420px; gap: 32px; align-items: start; }
    .r-dealer-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
    .r-values-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px; }
    .r-products-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; }
    .r-features-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
    .r-franchise-pillars { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; margin-bottom: 48px; }
    .r-faq-form { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    .r-epoxy-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 80px; align-items: start; }
    .r-epoxy-specs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
    .r-no-flake-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; }
    .r-compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; }
    .r-contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: start; }
    .r-footer-grid { display: grid; grid-template-columns: 2.2fr 1fr 1fr 1fr; gap: 56px; margin-bottom: 56px; }
    .r-cta-band { display: flex; align-items: center; justify-content: space-between; gap: 32px; flex-wrap: wrap; }
    .r-about-hero { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: flex-end; }
    .r-who-grid { display: grid; grid-template-columns: '1fr 2fr'; gap: 80px; align-items: start; }
    .r-who-cols { display: grid; grid-template-columns: '1fr 1fr'; gap: 40px; }

    @media (max-width: 1024px) {
      .r-grid-4 { grid-template-columns: repeat(2, 1fr); }
      .r-process-grid { grid-template-columns: repeat(2, 1fr); }
      .r-gallery-grid { grid-template-columns: repeat(2, 1fr); grid-template-rows: auto; }
      .r-swatch-grid-flex { grid-template-columns: repeat(6, 1fr); }
      .r-swatch-grid-stone { grid-template-columns: repeat(4, 1fr); }
      .r-swatch-grid-poly { grid-template-columns: repeat(3, 1fr); }
      .r-dealer-grid { grid-template-columns: repeat(2, 1fr); }
      .r-values-grid { grid-template-columns: repeat(2, 1fr); }
      .r-epoxy-grid { grid-template-columns: 1fr; gap: 40px; }
      .r-epoxy-specs { grid-template-columns: repeat(2, 1fr); }
      .r-footer-grid { grid-template-columns: 1fr 1fr; gap: 32px; }
    }

    @media (max-width: 768px) {
      .r-grid-2 { grid-template-columns: 1fr; }
      .r-grid-3 { grid-template-columns: 1fr; }
      .r-grid-4 { grid-template-columns: 1fr; }
      .r-grid-service { grid-template-columns: 1fr; }
      .r-two-col { grid-template-columns: 1fr; gap: 40px; }
      .r-two-col-center { grid-template-columns: 1fr; gap: 40px; }
      .r-hero-stats { flex-direction: column; }
      .r-stat-item { border-right: none !important; border-bottom: 1px solid rgba(255,255,255,0.08); padding-left: 0 !important; padding-right: 0 !important; }
      .r-stat-item:last-child { border-bottom: none; }
      .r-nav-links { display: none; }
      .r-hamburger { display: flex; flex-direction: column; gap: 5px; }
      .r-mobile-menu { display: block; position: fixed; inset: 0; background: #141414; z-index: 300; padding: 100px 32px 48px; }
      .r-utility-bar { display: none; }
      .r-pad { padding: 0 24px; }
      .r-section-pad { padding: 64px 0; }
      .r-swatch-grid-flex { grid-template-columns: repeat(4, 1fr); }
      .r-swatch-grid-stone { grid-template-columns: repeat(3, 1fr); }
      .r-swatch-grid-poly { grid-template-columns: repeat(2, 1fr); }
      .r-process-grid { grid-template-columns: 1fr; }
      .r-gallery-grid { grid-template-columns: 1fr 1fr; grid-template-rows: auto; height: auto; }
      .r-color-picker-grid { grid-template-columns: 1fr; }
      .r-dealer-grid { grid-template-columns: 1fr; }
      .r-values-grid { grid-template-columns: 1fr; }
      .r-products-grid { grid-template-columns: 1fr; }
      .r-features-grid { grid-template-columns: 1fr; }
      .r-franchise-pillars { grid-template-columns: 1fr; }
      .r-faq-form { grid-template-columns: 1fr; }
      .r-epoxy-grid { grid-template-columns: 1fr; }
      .r-epoxy-specs { grid-template-columns: 1fr 1fr; }
      .r-no-flake-grid { grid-template-columns: 1fr; }
      .r-compare-grid { grid-template-columns: 1fr; }
      .r-contact-grid { grid-template-columns: 1fr; }
      .r-footer-grid { grid-template-columns: 1fr; gap: 32px; }
      .r-cta-band { flex-direction: column; align-items: flex-start; }
      .r-about-hero { grid-template-columns: 1fr; gap: 32px; }
      .r-who-grid { grid-template-columns: 1fr !important; }
      .r-who-cols { grid-template-columns: 1fr !important; }
    }

    @media (max-width: 480px) {
      .r-swatch-grid-flex { grid-template-columns: repeat(3, 1fr); }
      .r-gallery-grid { grid-template-columns: 1fr; grid-template-rows: auto; }
      .r-epoxy-specs { grid-template-columns: 1fr; }
    }
  </style>
</head>

<div id="root"></div>
<script type="text/babel">

/* ─────────────────────────────────────────
   SHARED HELPERS
───────────────────────────────────────── */
const C = {
  red: '#C41230',
  redDark: '#9E0E26',
  black: '#141414',
  darkGray: '#2D2D2D',
  midGray: '#6B6B6B',
  lightGray: '#C4C4C4',
  offWhite: '#F2F2F2',
  white: '#FFFFFF',
};

const T = {
  display: "'Barlow Condensed', sans-serif",
  body: "'Barlow', sans-serif",
};

const Btn = ({ children, variant = 'primary', onClick, href, style = {} }) => {
  const base = {
    display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
    fontFamily: T.display, fontWeight: 800, fontSize: 14, letterSpacing: '0.14em',
    textTransform: 'uppercase', border: 'none', cursor: 'pointer', padding: '15px 36px',
    transition: 'all 0.2s ease', textDecoration: 'none', ...style,
  };
  const [hover, setHover] = React.useState(false);
  const styles = {
    primary: { background: hover ? C.redDark : C.red, color: C.white },
    ghost: { background: 'transparent', color: hover ? C.white : 'rgba(255,255,255,0.7)', border: '2px solid ' + (hover ? 'rgba(255,255,255,0.5)' : 'rgba(255,255,255,0.2)') },
    ghostDark: { background: 'transparent', color: hover ? C.black : C.midGray, border: '2px solid ' + (hover ? C.black : C.lightGray) },
  };
  const Tag = href ? 'a' : 'button';
  return (
    <Tag href={href} onClick={onClick} style={{ ...base, ...styles[variant] }}
      onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}>
      {children}
    </Tag>
  );
};

const Label = ({ children, light = false }) => (
  <div className="red-rule" style={{ marginBottom: 14 }}>
    <span style={{ fontFamily: T.display, fontWeight: 300, fontSize: 11, letterSpacing: '0.24em', textTransform: 'uppercase', color: C.red }}>
      {children}
    </span>
  </div>
);

const PHOTOS = {
  hero: 'https://static.wixstatic.com/media/3855bd_2b1c87841d594d379dcfa640ea9fcf0d~mv2.jpg',
  driveway: 'https://static.wixstatic.com/media/3855bd_ce93f77a87444cd3a53a3219f9ce04f7~mv2.jpg',
  pool: 'https://static.wixstatic.com/media/3855bd_84c0f3a9faf3441d847efb25dfc7e6c4~mv2.jpg',
  epoxy: 'epoxy-floor.avif',
  metallic: 'https://static.wixstatic.com/media/3855bd_5de4b850fc714eb4bb1b50041fe2cb07~mv2.jpg',

  floor: 'https://static.wixstatic.com/media/3855bd_7a366e6177954effa2c653b05aa4e280~mv2.jpg',
};

/* Scroll observer for fade-in */
const useFade = () => {
  React.useEffect(() => {
    const els = document.querySelectorAll('.fade-in');
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); io.unobserve(e.target); } });
    }, { threshold: 0.1 });
    els.forEach(el => io.observe(el));
    return () => io.disconnect();
  });
};

/* ─────────────────────────────────────────
   HEADER
───────────────────────────────────────── */
const Header = ({ currentPage, onNavigate }) => {
  const [scrolled, setScrolled] = React.useState(false);
  const [menuOpen, setMenuOpen] = React.useState(false);

  React.useEffect(() => {
    const h = () => setScrolled(window.scrollY > 40);
    window.addEventListener('scroll', h);
    return () => window.removeEventListener('scroll', h);
  }, []);

  // Close menu on navigate
  const handleNav = (page) => { setMenuOpen(false); onNavigate(page); };

  const navLinks = [
    { label: 'Home', page: 'home' },
    { label: 'Solutions', page: 'services' },
    { label: 'Become a Dealer', page: 'dealers' },
    { label: 'About', page: 'about' },
  ];

  return (
    <header style={{
      position: 'fixed', top: 0, left: 0, right: 0, zIndex: 200,
      background: scrolled ? 'rgba(14,14,14,0.96)' : 'rgba(14,14,14,0.95)',
      borderBottom: scrolled ? '1px solid rgba(196,18,48,0.2)' : '1px solid transparent',
      backdropFilter: scrolled ? 'blur(12px)' : 'none',
      transition: 'all 0.3s ease',

      {/* Top utility bar */}
      <div className="r-utility-bar" style={{ background: C.red, padding: '6px 24px', justifyContent: 'flex-end', gap: 24 }}>
        <a href="tel:18009859394" style={{ fontFamily: T.display, fontWeight: 700, fontSize: 12, letterSpacing: '0.12em', color: C.white, textDecoration: 'none', textTransform: 'uppercase' }}>1-800-985-9394</a>
        <span style={{ color: 'rgba(255,255,255,0.4)' }}>|</span>
        <button onClick={() => handleNav('dealers')} style={{ background: 'none', border: 'none', cursor: 'pointer', fontFamily: T.display, fontWeight: 700, fontSize: 12, letterSpacing: '0.12em', color: C.white, textTransform: 'uppercase' }}>Find a Dealer</button>
      </div>

        {/* Desktop nav links */}
        <nav className="r-nav-links">
          {navLinks.map(l => {
            const active = currentPage === l.page;
            return (
              <button key={l.page} onClick={() => handleNav(l.page)} style={{
                background: 'none', border: 'none', cursor: 'pointer',
                fontFamily: T.display, fontWeight: 700, fontSize: 13, letterSpacing: '0.14em', textTransform: 'uppercase',
                color: active ? C.red : 'rgba(255,255,255,0.7)',
                borderBottom: `2px solid ${active ? C.red : 'transparent'}`,
                paddingBottom: 2, transition: 'all 0.2s ease',
              }}
              onMouseEnter={e => { if (!active) e.currentTarget.style.color = C.white; }}
              onMouseLeave={e => { if (!active) e.currentTarget.style.color = 'rgba(255,255,255,0.7)'; }}>
                {l.label}
              </button>
            );
          })}
          <Btn onClick={() => handleNav('contact')} style={{ fontSize: 13, padding: '11px 26px' }}>Get a Quote</Btn>
        </nav>

        {/* Hamburger */}
        <button className="r-hamburger" onClick={() => setMenuOpen(m => !m)} aria-label="Menu">

                <h4 style={{ fontFamily:T.display, fontWeight:800, fontSize:20, textTransform:'uppercase', letterSpacing:'0.02em', color:C.white, marginBottom:12 }}>{f.q}</h4>
                <p style={{ fontFamily:T.body, fontSize:15, color:'rgba(255,255,255,0.45)', lineHeight:1.75 }}>{f.a}</p>
              </div>
            ))}
          </div>
        </div>
      </div>

    </div>
  );
};

/* ─────────────────────────────────────────
   APP
───────────────────────────────────────── */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#C41230",
  "headerStyle": "transparent",
  "showProcessSection": true
}/*EDITMODE-END*/;

const App = () => {
  const [page, setPage] = React.useState(() => localStorage.getItem('kk_page') || 'home');
  const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
  const [tweakOpen, setTweakOpen] = React.useState(false);

  const navigate = (p) => {
    setPage(p);
    localStorage.setItem('kk_page', p);
    window.scrollTo({ top: 0 });
  };

  React.useEffect(() => {
    const h = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweakOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweakOpen(false);
    };
    window.addEventListener('message', h);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', h);
  }, []);

  const setTweak = (key, val) => {
    const next = { ...tweaks, [key]: val };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
  };

  return (
    <div>
      <Header currentPage={page} onNavigate={navigate} />

      {page === 'home' && <>
        <Hero onNavigate={navigate} />
        <ServicesSection onNavigate={navigate} />
        <WhyKapKrete />
        <ProcessSection />
        <GallerySection />
        <FranchiseTeaser onNavigate={navigate} />
        <CTABand onNavigate={navigate} />
        <Footer onNavigate={navigate} />
      </>}

      {page === 'services' && <>
        <ServicesPage onNavigate={navigate} />
        <CTABand onNavigate={navigate} />
        <Footer onNavigate={navigate} />
      </>}

      {page === 'epoxy' && <>
        <EpoxyFloorPage onNavigate={navigate} />
        <Footer onNavigate={navigate} />
      </>}

      {page === 'driveway' && <>
        <DrivewaPage onNavigate={navigate} />
        <Footer onNavigate={navigate} />
      </>}

      {page === 'poolDeck' && <>
        <PoolDeckPage onNavigate={navigate} />
        <Footer onNavigate={navigate} />
      </>}

      {page === 'patio' && <>
        <PatioPage onNavigate={navigate} />
        <Footer onNavigate={navigate} />
      </>}

      {page === 'franchise' && <>
        <DealersPage onNavigate={navigate} />
        <Footer onNavigate={navigate} />
      </>}

      {page === 'contact' && <>
        <ContactPage onNavigate={navigate} />
        <Footer onNavigate={navigate} />
      </>}

      {page === 'about' && <>
        <AboutPage onNavigate={navigate} />
        <CTABand onNavigate={navigate} />
        <Footer onNavigate={navigate} />
      </>}

      {page === 'dealers' && <>
        <DealersPage onNavigate={navigate} />
        <Footer onNavigate={navigate} />
      </>}

      {/* Tweaks Panel */}
      {tweakOpen && (
        <div style={{ position: 'fixed', bottom: 24, right: 24, background: '#1E1E1E', border: '1px solid rgba(255,255,255,0.1)', padding: 20, width: 260, zIndex: 9999, boxShadow: '0 8px 32px rgba(0,0,0,0.5)' }}>
          <div style={{ fontFamily: T.display, fontWeight: 800, fontSize: 14, letterSpacing: '0.16em', textTransform: 'uppercase', color: C.white, marginBottom: 16 }}>Tweaks</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
            <div>
              <label style={{ fontFamily: T.display, fontSize: 11, letterSpacing: '0.14em', textTransform: 'uppercase', color: 'rgba(255,255,255,0.4)', display: 'block', marginBottom: 8 }}>Accent Color</label>
              <div style={{ display: 'flex', gap: 8 }}>
                {['#C41230','#0055CC','#1A7A45','#D97000'].map(c => (
                  <button key={c} onClick={() => setTweak('accentColor', c)} style={{ width: 28, height: 28, background: c, border: tweaks.accentColor === c ? '2px solid #FFF' : '2px solid transparent', cursor: 'pointer' }} />
                ))}
              </div>
            </div>
            <div>
              <label style={{ fontFamily: T.display, fontSize: 11, letterSpacing: '0.14em', textTransform: 'uppercase', color: 'rgba(255,255,255,0.4)', display: 'block', marginBottom: 8 }}>Process Section</label>
              <button onClick={() => setTweak('showProcessSection', !tweaks.showProcessSection)} style={{ background: tweaks.showProcessSection ? C.red : 'rgba(255,255,255,0.1)', border: 'none', cursor: 'pointer', fontFamily: T.display, fontWeight: 700, fontSize: 11, letterSpacing: '0.14em', textTransform: 'uppercase', color: C.white, padding: '7px 14px' }}>
                {tweaks.showProcessSection ? 'Visible' : 'Hidden'}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
